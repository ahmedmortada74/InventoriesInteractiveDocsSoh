<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">

    <title> Shefaa El-Orman Hospital :: Inventories Screens</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="./data.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --glass: rgba(255, 255, 255, 0.7);
            --slate-800: #1e293b;
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .title-card {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 15px 40px;
            border-radius: 100px;
            border: 1px solid white;
            box-shadow: var(--shadow-lg);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 1200px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            padding: 30px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: var(--shadow-lg);
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card:hover {
            transform: translateY(-10px);
            background: white;
            border-color: var(--primary);
        }

        .icon-box {
            width: 50px;
            height: 50px;
            background: #eef2ff;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }

        .badge {
            font-size: 0.7rem;
            padding: 4px 12px;
            background: #dcfce7;
            color: #166534;
            border-radius: 50px;
            width: fit-content;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto 40px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border-radius: 100px;
            border: 1px solid white;
            background: var(--glass);
            backdrop-filter: blur(8px);
            font-size: 1rem;
            outline: none;
            box-shadow: var(--shadow-lg);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 15px;
            color: var(--slate-800);
        }

        .cycle-section {
            margin-bottom: 50px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .cycle-title-card {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 10px 30px;
            border-radius: 100px;
            border: 1px solid white;
            box-shadow: var(--shadow-lg);
            margin-bottom: 25px;
            color: #1e293b;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .cycle-title-card:hover {
            transform: translateY(-2px);
            background: white;
        }
    </style>
</head>

            "ItemsInExamination": "reporting",
            "Effective_Material_Balance": "reporting",
            "Reorder_Point_Report_SCR": "reporting",
            "ItemCard": "reporting",








        };

        function renderScreens(filter = "") {
            const container = document.getElementById('cyclesContainer');
            container.innerHTML = '';

            // Initialize groups
            const groups = {};
            Object.keys(cycles).forEach(cId => {
                groups[cId] = [];
            });

            // Filter and assign screens
            screens.filter(s => s.title.includes(filter) || s.desc.includes(filter)).forEach(s => {
                const cycleId = screenCycleMap[s.id] || 'additional';
                groups[cycleId].push(s);
            });

            // Render each group
            Object.keys(cycles).forEach(cId => {
                const groupScreens = groups[cId];
                if (groupScreens.length === 0) return;

                const cycleInfo = cycles[cId];

                const section = document.createElement('section');
                section.className = 'cycle-section';

                const headerDiv = document.createElement('div');
                headerDiv.className = 'cycle-title-card';
                headerDiv.style.borderRight = `5px solid ${cycleInfo.color}`;
                headerDiv.innerHTML = `
          <i data-lucide="${cycleInfo.icon}" style="color: ${cycleInfo.color}; width: 22px; height: 22px;"></i>
          <h2 style="font-size: 1.15rem; font-weight: 700; display: flex; align-items: center; gap: 8px;">
            ${cycleInfo.title}
            <span style="font-size: 0.8rem; background: #eef2ff; color: var(--primary); padding: 2px 10px; border-radius: 50px; font-weight: 600;">
              ${groupScreens.length} شاشات
            </span>
          </h2>
        `;
                section.appendChild(headerDiv);

                const gridDiv = document.createElement('div');
                gridDiv.className = 'grid';

                groupScreens.forEach(s => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => window.location.href = 'viewer.html?screen=' + s.id;
                    card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center">
              <div class="icon-box"><i data-lucide="${s.icon}"></i></div>
              <span class="badge">تفاعلي</span>
            </div>
            <h3 style="font-size: 1.1rem">${s.title}</h3>
            <p style="font-size: 0.8rem; color: #64748b; line-height:1.5">${s.desc}</p>
            <div style="margin-top:auto; font-size: 0.75rem; color: var(--primary); font-weight:700"> Open ←</div>
          `;
                    gridDiv.appendChild(card);
                });

                section.appendChild(gridDiv);
                container.appendChild(section);
            });

            lucide.createIcons();
        }

        document.getElementById('searchInput').oninput = (e) => renderScreens(e.target.value);
        renderScreens();
    </script>
</body>
